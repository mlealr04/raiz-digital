<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Residente</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial;
        background-color: #e9e9e9;
    }

    /* HEADER */
    .header {
        background: linear-gradient(to right, #5a4a2f, #c89b4f);
        color: white;
        padding: 15px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
    }

    .inicio {
        cursor: pointer;
        font-weight: bold;
    }

    /* CONTENIDO */
    .container {
        padding: 40px;
    }

    .title {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .title img {
        width: 60px;
    }

    h1 {
        font-size: 50px;
        margin: 0;
    }

    hr {
        margin: 20px 0 30px 0;
        border: 1px solid #bbb;
    }

    /* GRID */
    .grid {
        display: flex;
        gap: 40px;
        align-items: flex-start;
    }

    /* AGENDA */
    .agenda {
        background-color: #cfc5b8;
        border-radius: 15px;
        padding: 20px;
        width: 400px;
        box-shadow: 0px 8px 15px rgba(0,0,0,0.2);
    }

    .agenda-title {
        font-weight: bold;
        margin-bottom: 15px;
    }

    .agenda-item {
        border-top: 1px solid #aaa;
        padding: 15px 0;
        display: flex;
        justify-content: space-between;
    }

    .agenda-item:first-of-type {
        border-top: none;
    }

    .left {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .dot {
        width: 30px;
        height: 30px;
        background-color: #d89b3c;
        border-radius: 50%;
    }

    .pending {
        font-size: 12px;
        text-decoration: underline;
    }

    /* TARJETAS */
    .cards {
        display: flex;
        gap: 30px;
    }

    .card {
        background-color: #d1a365;
        width: 180px;
        height: 150px;
        border-radius: 20px;
        box-shadow: 0px 8px 15px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .badge {
        position: absolute;
        top: -10px;
        right: -10px;
        background-color: #b52b3a;
        color: white;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        display: none;
        justify-content: center;
        align-items: center;
        font-size: 14px;
    }

    .icon {
        font-size: 40px;
        margin-top: 10px;
    }

</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <div>☰ RAÍZ DIGITAL > GESTIÓN FAMILIAR</div>
    <div class="inicio" onclick="irInicio()">CASA</div>
</div>

<div class="container">

    <div class="title">
        <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png">
        <h1>Residente</h1>
    </div>

    <hr>

    <div class="grid">

        <!-- AGENDA -->
        <div class="agenda">
            <div class="agenda-title">📅 AGENDA DE ACTIVIDADES</div>

            <div class="agenda-item">
                <div class="left">
                    <div class="dot"></div>
                    <div>
                        <div>Llamada en zoom</div>
                        <small>Fecha: 1 abr, 2:00 p.m.</small>
                    </div>
                </div>
                <div class="pending">Pendiente</div>
            </div>

            <div class="agenda-item">
                <div class="left">
                    <div class="dot"></div>
                    <div>
                        <div>Misa con nietos</div>
                        <small>Fecha: 3 abr, 8:30 p.m.</small>
                    </div>
                </div>
                <div class="pending">Pendiente</div>
            </div>

            <div class="agenda-item">
                <div class="left">
                    <div class="dot"></div>
                    <div>
                        <div>Desayuno con vecinos</div>
                        <small>Fecha: 4 abr, 8:00 a.m.</small>
                    </div>
                </div>
                <div class="pending">Pendiente</div>
            </div>
        </div>

        <!-- BOTONES -->
        <div class="cards">

            <div class="card" onclick="irRecordatorios()">
                <div class="badge" id="badge">3</div>
                RECORDATORIOS
                <div class="icon">🔔</div>
            </div>

            <div class="card" onclick="irNotas()">
                NOTAS
                <div class="icon">📝</div>
            </div>

        </div>

    </div>

</div>

<script>
    let notificaciones = 0;

    if (notificaciones > 0) {
        const badge = document.getElementById("badge");
        badge.style.display = "flex";
        badge.textContent = notificaciones;
    }

    function irInicio() {
        window.location.href = "index.html";
    }

    function irRecordatorios() {
        window.location.href = "recordatorios.html";
    }

    function irNotas() {
        window.location.href = "notas.html";
    }
</script>

</body>
</html>
