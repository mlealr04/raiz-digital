<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial Médico</title>

<style>
    body {
        font-family: 'Segoe UI', Arial;
        margin: 0;
        background-color: #f4f4f4;
    }

    /* HEADER */
    .header {
        background: linear-gradient(to right, #6b5b3e, #c89b4f);
        color: white;
        padding: 15px 30px;
        font-weight: bold;
    }

    .container {
        padding: 30px;
    }

    h1 {
        margin-bottom: 20px;
    }

    /* BOTÓN */
    button {
        background-color: #c89b4f;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background-color: #a87e3c;
    }

    /* CARD */
    .card {
        background-color: #fff;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        margin-top: 20px;
    }

    /* INPUT */
    input {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        margin-right: 10px;
    }

    /* TABLE */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        overflow: hidden;
        border-radius: 10px;
    }

    thead {
        background-color: #c89b4f;
        color: white;
    }

    th, td {
        padding: 10px;
        text-align: center;
    }

    tbody tr:nth-child(even) {
        background-color: #f9f9f9;
    }

    tbody tr:hover {
        background-color: #f1e7d3;
    }

    .no-data {
        text-align: center;
        padding: 15px;
        font-style: italic;
    }
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    RAÍZ DIGITAL > HISTORIAL MÉDICO
</div>

<div class="container">

    <!-- BOTÓN REGRESAR -->
   <button onclick="window.location.href='/raiz-digital/panel_familiar.php'">
        ⬅ Regresar
    </button>

    <h1>Historial Médico del Residente</h1>

    <!-- CARD -->
    <div class="card">

        <label>Selecciona fecha:</label>
        <input type="date" id="fecha">

        <button onclick="cargarDatos()">Ver</button>

        <table id="tabla">
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Presión</th>
                    <th>Temp</th>
                    <th>FC</th>
                    <th>FR</th>
                    <th>O2</th>
                    <th>Glucosa</th>
                    <th>Observaciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

</div>

<script>

// fecha de hoy por defecto
document.getElementById("fecha").valueAsDate = new Date();

// cargar datos
function cargarDatos() {

    const fecha = document.getElementById("fecha").value;

    fetch(`historial_familiar.php?fecha=${fecha}`)
    .then(res => res.json())
    .then(data => {

        const tbody = document.querySelector("#tabla tbody");
        tbody.innerHTML = "";

        if (data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='8' class='no-data'>Sin registros</td></tr>";
            return;
        }

        data.forEach(row => {
            tbody.innerHTML += `
                <tr>
                    <td>${row.hora}</td>
                    <td>${row.presion}</td>
                    <td>${row.temperatura}</td>
                    <td>${row.frecuencia_cardiaca}</td>
                    <td>${row.frecuencia_respiratoria}</td>
                    <td>${row.oxigeno}</td>
                    <td>${row.glucosa}</td>
                    <td>${row.observaciones}</td>
                </tr>
            `;
        });

    });
}

// cargar al inicio
cargarDatos();

</script>

</body>
</html>
