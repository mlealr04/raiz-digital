<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Crear Aviso</title>

    <style>
      body {
        font-family: "Segoe UI";
        background-color: #e9e9e9;
        text-align: center;
        padding: 40px;
      }

      .form {
        background: #cfc5b8;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        margin: auto;
        box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
      }

      input,
      textarea {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
      }

      button {
        background-color: #5a4a2f;
        color: white;
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        background-color: #c89b4f;
      }
    </style>
  </head>
  <body>
    <div class="form">
      <h2>🔔 Crear Aviso</h2>

      <form action="../crear_aviso.php" method="POST">
        <input
          type="text"
          name="titulo"
          placeholder="Insumo (Ej: Medicamento)"
          required
        />

        <textarea name="descripcion" placeholder="Detalles"></textarea>

        <input
          type="text"
          name="cantidad"
          placeholder="Cantidad (Ej: 2 cajas)"
          required
        />

        <input type="date" name="fecha" required />

        <button type="submit">Guardar Aviso</button>
      </form>

      <br />
      <a href="../gestion_familiar.php">⬅ Regresar</a>
    </div>
  </body>
</html>
