<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial;
        background-color: #e9e9e9;
    }

    /* HEADER */
    .header {
        background: linear-gradient(to right, #5a4a2f, #c89b4f);
        color: white;
        padding: 17px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .inicio {
        cursor: pointer;
        font-weight: bold;
    }

    /* CONTENEDOR */
    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 90vh;
    }

    /* CARD FORM */
    .card {
        background-color: #cfc5b8;
        padding: 30px;
        border-radius: 20px;
        width: 350px;
        box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    /* INPUTS */
    input, select {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    /* BOTÓN */
    button {
        width: 100%;
        padding: 12px;
        background-color: #c89b4f;
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #a87e3c;
    }

    /* CAMPOS EXTRA */
    .extra {
        display: none;
        margin-top: 10px;
    }

</style>

<script>
function mostrarCampos() {
  let rol = document.getElementById("rol").value;

  document.getElementById("familiar").style.display =
    (rol === "familiar") ? "block" : "none";
}

function irInicio() {
    window.location.href = "index.html";
}
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>☰ RAÍZ DIGITAL > REGISTRO</div>
    <div class="inicio" onclick="irInicio()">CASA</div>
</div>

<!-- FORM -->
<div class="container">
    <div class="card">

        <h2>Registro</h2>

        <form action="registro.php" method="POST">

            <input type="text" name="nombre" placeholder="Nombre" required>

            <input type="email" name="correo" placeholder="Correo" required>

            <input type="password" name="password" placeholder="Contraseña" required>

            <label>Rol:</label>
            <select name="rol" id="rol" onchange="mostrarCampos()" required>
                <option value="">Selecciona</option>
                <option value="enfermero">Enfermero</option>
                <option value="familiar">Familiar</option>
            </select>

            <!-- FAMILIAR -->
            <div id="familiar" class="extra">
                <h4>Datos Familiar</h4>
                <input type="text" name="telefono" placeholder="Teléfono">
            </div>

            <button type="submit">Registrarse</button>

        </form>

    </div>
</div>

</body>
</html>
